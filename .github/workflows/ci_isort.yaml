name: isort check

on: 
  push:
    branches: [dev, 'feature/**']
  pull_request:
    branches: [dev, 'feature/**']

jobs:
  isort:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Message
        run: echo "Lancement du check isort..."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install isort
        run: |
          python -m pip install --upgrade pip
          pip install isort

      - name: Run isort (check only)
        run: isort . --check-only --profile black