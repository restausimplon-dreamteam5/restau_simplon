name: black check

on:
  push:
    branches: [main, dev, 'feature/**']
  pull_request:
    branches: [main, dev, 'feature/**']

jobs:
  black:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Message
        run: echo "Lancement du check black..."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install black
        run: |
          python -m pip install --upgrade pip
          pip install black

      - name: Run black (check only)
        run: black . --check
